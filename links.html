  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #050505;
      color: #f5f5f5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 4rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    /* Profile */
    .profile {
      text-align: center;
    }

    .profile-name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .profile-bio {
      font-size: 0.9rem;
      color: #a0a0a0;
      font-weight: 300;
      line-height: 1.6;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .link-card {
      display: block;
      width: 100%;
      padding: 1.1rem 1.5rem;
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      color: #f5f5f5;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
      cursor: pointer;
    }

    .link-card:hover {
      background: #161310;
      border-color: rgba(201, 164, 74, 0.35);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(201, 164, 74, 0.1);
    }

    .link-card:active {
      transform: translateY(0);
    }

    .link-card .subtitle {
      display: block;
      font-size: 0.75rem;
      color: #707070;
      font-weight: 300;
      margin-top: 0.3rem;
    }

    /* Footer */
    .footer {
      font-size: 0.7rem;
      color: #404040;
      letter-spacing: 0.02em;
      text-align: center;
    }
  </style>

</head>
<body>

  <div class="container">
    <div class="profile">
      <div class="profile-name">0xscrubbed</div>
      <p class="profile-bio">building ios apps in public. all numbers real.</p>
    </div>

    <div class="links">
      <a href="https://splitsteal.app" class="link-card" data-link="split-or-steal" target="_blank" rel="noopener">
        Split or Steal
        <span class="subtitle">Game theory for your dinner bill</span>
      </a>

      <a href="https://x.com/0xscrubbed" class="link-card" data-link="follow-x" target="_blank" rel="noopener">
        Follow on X
      </a>

      <a href="#" class="link-card" data-link="newsletter">
        Newsletter
        <span class="subtitle">Coming soon</span>
      </a>
    </div>

    <div class="footer">&copy; 2026 0xscrubbed</div>
  </div>

  <script>
    document.querySelectorAll('.link-card').forEach(function(card) {
      card.addEventListener('click', function() {
        var linkName = this.getAttribute('data-link');
        if (window.posthog) {
          posthog.capture('bio_link_click', { link: linkName });
        }
      });
    });
  </script>
